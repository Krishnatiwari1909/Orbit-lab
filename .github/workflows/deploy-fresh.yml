name: Fresh Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # We use the new secret name to bypass the error
          azure_static_web_apps_api_token: ${{ secrets.MY_FRESH_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          ###### CONFIGURATION ######
          app_location: "/"           
          api_location: ""            
          output_location: "."        
          app_build_command: "true"   # Forces skip of build step
          ###########################
