<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>OrbitLab: Login - Satellite Simulator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        :root {
            --accent-blue: #3fd1ff;
            --accent-green: #00ff9d;
            --accent-warn: #ffb86c;
            --text-main: #f0f0f0;
            --text-dim: #8899a6;
            --bg-color: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', monospace;
            background: radial-gradient(circle at 50% 30%, #0a0a0a, #000);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        #login-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 30%, #000000, #000);
            z-index: 100;
        }

        #login-stars {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .login-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 420px;
            padding: 40px;
            background: rgba(12, 16, 28, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
        }

        .login-logo {
            width: 100%;
            height: auto;
            max-width: 280px;
            margin: 0 auto 12px;
            display: block;
        }

        .login-logo .glyph {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .login-logo .accent-group {
            animation: spin 3s linear infinite;
            transform-origin: 50px 60px;
        }

        .login-logo .accent {
            fill: var(--accent-green);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .login-subtitle {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(63, 209, 255, 0.3);
            border-radius: 4px;
            color: var(--text-main);
            font-family: 'Segoe UI', monospace;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(63, 209, 255, 0.1);
            box-shadow: 0 0 12px rgba(63, 209, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            font-size: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: var(--accent-green);
        }

        .checkbox-group label {
            cursor: pointer;
            color: var(--text-dim);
            margin: 0;
        }

        #login-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        #login-btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px rgba(63, 209, 255, 0.4);
        }

        #login-btn:active {
            transform: scale(0.98);
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .signup-link {
            font-size: 12px;
            color: var(--text-dim);
        }

        .signup-link a {
            color: var(--accent-green);
            text-decoration: none;
            transition: color 0.3s;
        }

        .signup-link a:hover {
            color: #00ff9d;
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
        }

        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .success-message {
            color: var(--accent-green);
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login-container">
    <canvas id="login-stars"></canvas>

    <div class="login-content">
        <!-- ORBITLAB LOGO -->
        <svg class="login-logo" viewBox="0 0 420 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
            <circle cx="50" cy="60" r="26" class="glyph"/>
            <g class="accent-group">
                <circle cx="64" cy="40" r="5" class="accent"/>
            </g>
            <path d="M90 86 V44 Q90 34 104 34" class="glyph"/>
            <path d="M128 20 V86" class="glyph"/>
            <circle cx="146" cy="60" r="18" class="glyph"/>
            <line x1="176" y1="44" x2="176" y2="86" class="glyph"/>
            <circle cx="176" cy="32" r="3" class="glyph"/>
            <line x1="204" y1="44" x2="204" y2="86" class="glyph"/>
            <line x1="192" y1="50" x2="216" y2="50" class="glyph"/>
            <path d="M252 20 V86 H286" class="glyph"/>
            <circle cx="318" cy="60" r="18" class="glyph"/>
            <line x1="336" y1="60" x2="336" y2="86" class="glyph"/>
            <path d="M360 20 V86" class="glyph"/>
            <circle cx="378" cy="60" r="18" class="glyph"/>
        </svg>

        <div class="login-title">Secure Access</div>
        <div class="login-subtitle">Simulator Command Center</div>

     
        

        <form id="login-form">
            <!-- Email/Username Field -->
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username or email"
                    required
                />
                <div class="error-message" id="username-error"></div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                />
                <div class="error-message" id="password-error"></div>
            </div>

            

            <!-- Login Button -->
            <button type="submit" id="login-btn">LOGIN</button>

            <div class="success-message" id="success-message">Login successful! Redirecting...</div>
            <div class="error-message" id="form-error"></div>

            <!-- Divider -->
            <div class="divider"></div>

            <!-- Sign Up Link -->
            <div class="signup-link">
                Don't have an account? <a href="#signup">Create one here</a>
            </div>
        </form>
    </div>
</div>

<!-- Star Field Canvas Script -->
<script>
(() => {
    const canvas = document.getElementById("login-stars");
    const ctx = canvas.getContext("2d");
    let w, h;
    const stars = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // Generate static stars
    for (let i = 0; i < 200; i++) {
        stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.0 + 0.2,
            a: Math.random() * Math.PI * 2,
            brightness: Math.random() * 0.4 + 0.3
        });
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);

        for (const s of stars) {
            ctx.globalAlpha = s.brightness + Math.sin(Date.now() * 0.001 + s.a) * 0.2;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        }

        requestAnimationFrame(draw);
    }

    draw();
})();
</script>

<!-- Login Form Handler Script -->
<script>
document.getElementById('login-form').addEventListener('submit', (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    const usernameError = document.getElementById('username-error');
    const passwordError = document.getElementById('password-error');
    const formError = document.getElementById('form-error');
    const successMessage = document.getElementById('success-message');

    // Clear previous messages
    usernameError.display = 'none';
    passwordError.display = 'none';
    formError.display = 'none';
    successMessage.display = 'none';

    let hasError = false;

    // Validate username
    if (!username) {
        usernameError.textContent = 'Username or email is required';
        usernameError.style.display = 'block';
        hasError = true;
    } else if (username.length < 3) {
        usernameError.textContent = 'Username must be at least 3 characters';
        usernameError.style.display = 'block';
        hasError = true;
    }

    // Validate password
    if (!password) {
        passwordError.textContent = 'Password is required';
        passwordError.style.display = 'block';
        hasError = true;
    } else if (password.length < 6) {
        passwordError.textContent = 'Password must be at least 6 characters';
        passwordError.style.display = 'block';
        hasError = true;
    }

    if (hasError) return;

    // Define valid credentials (in production, this should be server-side)
    const validCredentials = [
        { username: 'admin', password: 'admin123' },
        { username: 'user', password: 'user123' },
        { username: 'demo', password: 'demo123' },
        { username: 'test', password: 'test123' }
    ];

    // Check if credentials are valid
    const isValidUser = validCredentials.some(
        cred => cred.username === username && cred.password === password
    );

    if (!isValidUser) {
        formError.textContent = 'Invalid username or password. Please try again.';
        formError.style.display = 'block';
        return;
    }

    // Show success message
    successMessage.style.display = 'block';
    document.getElementById('login-btn').disabled = true;

    // Set login flag in sessionStorage (clears on hard refresh/browser close)
    sessionStorage.setItem('orbitlab_logged_in', 'true');
    sessionStorage.setItem('orbitlab_username', username);

    // Redirect to simulation page after 1.5 seconds
    setTimeout(() => {
        window.location.href = 'index.html?skipLanding=true';
    }, 1500);
});

// Clear error messages when user starts typing
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const usernameError = document.getElementById('username-error');
const passwordError = document.getElementById('password-error');
const formError = document.getElementById('form-error');

usernameInput.addEventListener('input', () => {
    usernameError.style.display = 'none';
    formError.style.display = 'none';
});

passwordInput.addEventListener('input', () => {
    passwordError.style.display = 'none';
    formError.style.display = 'none';
});

</script>

</body>
</html>
